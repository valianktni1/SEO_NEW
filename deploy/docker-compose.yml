# SEO Command Centre — Dockge / Docker Compose stack
# Drop this into Dockge on your TrueNAS. Adjust ports + REACT_APP_BACKEND_URL to match your reverse proxy / subdomain.

version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: seo-mongo
    restart: unless-stopped
    volumes:
      - seo_mongo:/data/db
    networks:
      - seo-net

  backend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.backend
    container_name: seo-backend
    restart: unless-stopped
    environment:
      - MONGO_URL=mongodb://mongo:27017
      - DB_NAME=seo_command_centre
      - CORS_ORIGINS=*
    depends_on:
      - mongo
    networks:
      - seo-net
    # Optional: expose backend directly for debugging
    # ports:
    #   - "8001:8001"

  frontend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.frontend
      args:
        # When using the bundled nginx reverse proxy, leave blank so the frontend
        # uses the same host (relative /api). When the frontend is behind a
        # different subdomain, set this to the backend's public URL.
        REACT_APP_BACKEND_URL: ""
    container_name: seo-frontend
    restart: unless-stopped
    ports:
      - "8088:80"   # change 8088 to whatever port you want on TrueNAS
    depends_on:
      - backend
    networks:
      - seo-net

volumes:
  seo_mongo:

networks:
  seo-net:
    driver: bridge
